---
- name: Manage VLANs on Cisco IOS Switches
  hosts: S1
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: cisco.ios.ios

  tasks:
    - name: Step 2 - Assign Layer 3 IP addresses to the VLAN interfaces
      cisco.ios.ios_l3_interfaces:
        state: merged
        config:
          - name: Vlan10
            ipv4:
              - address: 192.168.10.1/24
          - name: Vlan20
            ipv4:
              - address: 192.168.20.1/24

    - name: Step 3 - Ensure the L3 VLAN interfaces are enabled (no shutdown)
      cisco.ios.ios_interfaces:
        state: merged
        config:
          - name: Vlan10
            enabled: true
          - name: Vlan20
            enabled: true

    - name: Step 4 - Enable global IP routing on the switch hardware
      cisco.ios.ios_config:
        lines:
          - ip routing

    - name: Create VLANs inside the legacy database shell
      cisco.ios.ios_command:
        commands:
          - command: vlan database
            prompt: 'vlan\)'          # Detects entering the switch(vlan)# prompt
            answer: 'vlan 10 name Operations_VLAN'

          - command: vlan 20 name Finance_VLAN
            prompt: 'vlan\)'
            answer: 'apply'            # Commits changes to the vlan.dat file

          - command: exit              # Safely exits the database shell
