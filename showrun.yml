---
- name: Gather Cisco IOS Running Config Details
  hosts: R1
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: cisco.ios.ios

  tasks:
    - name: Output Of Show Running-Config Command
      cisco.ios.ios_command:
        commands:
          - show running-config
      register: interface_output

    - name: Display running configuration in Semaphore UI Logs
      ansible.builtin.debug:
        msg: "{{ interface_output.stdout_lines[0] }}"
