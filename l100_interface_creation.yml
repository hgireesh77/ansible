---
- name: Configure and Verify Cisco Loopback Interface
  hosts: R1
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: cisco.ios.ios

  tasks:
    # Phase 1: Creation and State Deployment
    - name: Ensure Loopback 100 Interface Exists and Is Up
      cisco.ios.ios_interfaces:
        config:
          - name: Loopback100
            description: "Managed by Semaphore UI Automation"
            enabled: true
        state: merged

    - name: Assign IP Address to Loopback 100
      cisco.ios.ios_l3_interfaces:
        config:
          - name: Loopback100
            ipv4:
              - address: 10.100.100.1/32
        state: merged

    # Phase 2: Operational Verification
    - name: Gather Live Interface Status List
      cisco.ios.ios_command:
        commands:
          - show ip interface brief
      register: interface_list_output

    - name: Stream New Interface List to Semaphore Logs
      ansible.builtin.debug:
        msg: 
          - "=================================================="
          - " VERIFIED INTERFACE DASHBOARD"
          - "=================================================="
          - "{{ interface_list_output.stdout_lines[0] }}"
